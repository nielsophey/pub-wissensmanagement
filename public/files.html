<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wissenmanagement - Dateiverwaltung</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">📚 Wissenmanagement</a>
    <ul class="nav-links">
      <li><a href="/">Durchlauf</a></li>
      <li><a href="/admin">Administration</a></li>
      <li><a href="/files" class="active">Dateiverwaltung</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Dateiverwaltung</h1>

    <div class="files-layout">
      <!-- Durchläufe-Liste -->
      <div class="panel">
        <div class="panel-header">Durchläufe</div>
        <div class="panel-body" style="padding:0">
          <ul class="run-list" id="run-list">
            <li style="padding:1rem; color:var(--text-muted); font-size:0.9rem">Lade Durchläufe...</li>
          </ul>
        </div>
      </div>

      <!-- Dateien des ausgewählten Durchlaufs -->
      <div class="panel">
        <div class="panel-header">
          <span id="files-title">Dateien</span>
          <div style="display:flex; gap:0.5rem;">
            <button class="btn btn-sm btn-primary" id="btn-open-run" disabled>▶ Durchlauf öffnen</button>
            <button class="btn btn-sm btn-primary" id="btn-download-wiki" disabled>⬇ Wiki herunterladen</button>
            <button class="btn btn-sm btn-danger" id="btn-delete-run" disabled>Durchlauf löschen</button>
          </div>
        </div>
        <div class="panel-body">
          <h3 style="font-size:0.9rem; margin-bottom:0.75rem">Hochgeladene Dateien</h3>
          <ul class="file-list" id="upload-files"></ul>

          <h3 style="font-size:0.9rem; margin:1.5rem 0 0.75rem">Wiki-Output</h3>
          <ul class="file-list" id="wiki-files"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedRunId = null;

    async function loadRuns() {
      const res = await fetch('/api/runs');
      const runs = await res.json();
      const list = document.getElementById('run-list');

      if (runs.length === 0) {
        list.innerHTML = '<li style="padding:1rem; color:var(--text-muted); font-size:0.9rem">Keine Durchläufe vorhanden.</li>';
        return;
      }

      list.innerHTML = runs.map(r => `
        <li class="run-item" data-id="${r.id}">
          <div class="run-name">${escapeHtml(r.name || r.id)}</div>
          <div class="run-date">${r.createdAt ? new Date(r.createdAt).toLocaleString('de-DE') : ''}</div>
        </li>
      `).join('');

      list.querySelectorAll('.run-item').forEach(item => {
        item.addEventListener('click', () => selectRun(item.dataset.id));
      });
    }

    async function selectRun(runId) {
      selectedRunId = runId;

      document.querySelectorAll('.run-item').forEach(i => i.classList.remove('active'));
      document.querySelector(`.run-item[data-id="${runId}"]`)?.classList.add('active');

      document.getElementById('btn-delete-run').disabled = false;
      document.getElementById('btn-download-wiki').disabled = false;
      document.getElementById('btn-open-run').disabled = false;

      // Dateien laden
      const [uploadRes, wikiRes] = await Promise.all([
        fetch(`/api/runs/${runId}/files`),
        fetch(`/api/runs/${runId}/wiki`)
      ]);

      const uploads = await uploadRes.json();
      const wiki = await wikiRes.json();

      renderFileList('upload-files', uploads, true);
      renderFileList('wiki-files', wiki, false);
    }

    function renderFileList(elementId, files, canDelete) {
      const list = document.getElementById(elementId);
      if (files.length === 0) {
        list.innerHTML = '<li class="file-item" style="color:var(--text-muted)">Keine Dateien</li>';
        return;
      }

      list.innerHTML = files.map(f => `
        <li class="file-item">
          <span class="file-name">${escapeHtml(f.path)}</span>
          ${canDelete ? `<button class="file-delete" data-path="${escapeHtml(f.path)}" title="Löschen">✕</button>` : ''}
        </li>
      `).join('');

      if (canDelete) {
        list.querySelectorAll('.file-delete').forEach(btn => {
          btn.addEventListener('click', async () => {
            await fetch(`/api/runs/${selectedRunId}/files/${encodeURIComponent(btn.dataset.path)}`, { method: 'DELETE' });
            selectRun(selectedRunId);
          });
        });
      }
    }

    document.getElementById('btn-delete-run').addEventListener('click', async () => {
      if (!selectedRunId) return;
      if (!confirm('Durchlauf wirklich löschen?')) return;
      await fetch(`/api/runs/${selectedRunId}`, { method: 'DELETE' });
      selectedRunId = null;
      loadRuns();
      document.getElementById('upload-files').innerHTML = '';
      document.getElementById('wiki-files').innerHTML = '';
    });

    document.getElementById('btn-download-wiki').addEventListener('click', () => {
      if (!selectedRunId) return;
      window.location.href = `/api/runs/${selectedRunId}/wiki/download`;
    });

    document.getElementById('btn-open-run').addEventListener('click', () => {
      if (!selectedRunId) return;
      window.location.href = `/?run=${selectedRunId}`;
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadRuns();
  </script>
</body>
</html>
